[env]
platform = espressif32
board = m5stack-stamps3
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
lib_deps =
    m5stack/M5Cardputer
    #esphome/ESP32-audioI2S@^2.3.0
build_type = release
board_build.partitions = default.csv
board_build.f_cpu = 80000000L #240000000L is maximum
board_build.f_flash = 80000000L
board_build.flash_mode = qio

[env:m5stack-cardputer]
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -std=gnu++17
    -fexceptions

[env:m5stack-cardputer-adv]
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -std=gnu++17
    -fexceptions
    -DCARDPUTER_ADV